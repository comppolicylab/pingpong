# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.11
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [ python, pyi ]
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        types_or: [ python, pyi ]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --install-types, --non-interactive]
        exclude: alembic/
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.10.4
    hooks:
      - id: uv-lock
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: codeql-actions
        name: codeql (actions)
        entry: ./run-codeql-pr.sh actions
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]
  - repo: local
    hooks:
      - id: codeql-javascript
        name: codeql (javascript)
        entry: ./run-codeql-pr.sh javascript
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]
  - repo: local
    hooks:
      - id: codeql-python
        name: codeql (python)
        entry: ./run-codeql-pr.sh python
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]
